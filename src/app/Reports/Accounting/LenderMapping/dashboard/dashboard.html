<main>
    <div class="container-fluid">
        <div class="row">
            <div class="col-12 my-2">
                <div class="d-flex align-items-center totals-block">
                    <span class="me-auto divNormal">Count : <span class="divBold">{{filteredData.length}}</span></span>
                    <div class="search ms-auto">
                        <input type="text" class="form-control" placeholder="Search" [(ngModel)]="searchText"
                            (input)="onSearch()">
                        <img src="images/Magnifer.svg" alt="">
                    </div>
                </div>
            </div>
        </div>
        <div class="row" id="lenderMapping">
            <div class="col-md-12 col-lg-12 col-xl-12 col-xxl-12" id="lenderMapping">
                <div class="scorecard-single-header lendersmapping-tbl" id="scrollcent" #scrollcent>
                    <table class="table mb-0 w-100">
                        <thead>
                            <tr>
                                <th>Lender Name in DMS</th>
                                <th>Lender Name </th>
                                <th>Lender Type </th>
                                <th>Lender Category </th>
                            </tr>
                        </thead>
                        <ng-container>
                            <tbody *ngIf="filteredData.length > 0">
                                <tr *ngFor="let ld of filteredData; let i = index">
                                    <td class="text-start">
                                        {{ ld.DMS_Lender_Text || '-' }}
                                    </td>
                                    <td class="text-start">
                                        {{ ld.LenderName || '-' }}
                                    </td>
                                    <td class="text-start">
                                        {{ ld.LenderType || '-' }}
                                    </td>
                                    <td class="text-start">
                                        {{ ld.Category || '-' }}
                                    </td>
                                </tr>
                            </tbody>
                            <tbody *ngIf="filteredData.length === 0">
                                <tr>
                                    <td colspan="4" class="text-center">
                                        No Records Found!!!
                                    </td>
                                </tr>
                            </tbody>
                        </ng-container>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>
