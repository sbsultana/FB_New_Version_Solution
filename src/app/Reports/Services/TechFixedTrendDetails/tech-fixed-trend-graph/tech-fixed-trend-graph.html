<div class="container-fluid d-flex justify-content-center align-items-center popup-container m-0 p-0">

    <div class="gross-popup rounded">

        <div class="header d-flex align-items-center">
            <h5 class="title m-0 ms-2">
                <span class="slash text-white">
                    // {{ STRgraphdetails.NAME }}
                </span>
            </h5>

            <a type="button" class="close-btn ms-auto me-2" (click)="close()">
                <i class="fa-solid fa-xmark"></i>
            </a>
        </div>

        <div class="content m-5 mt-0 rounded">

            <h6 class="text-center py-2 mb-3">

                <!-- <span style="color: #2d91f1; font-weight: 600;">
                    {{
                    STRgraphdetails.Object.ast_paytype === 'Totals' ? 'TOTAL' :
                    (STRgraphdetails.Object.ast_paytype ?
                    (STRgraphdetails.Object.ast_paytype === 'C' ? 'CUSTOMER PAY' :
                    STRgraphdetails.Object.ast_paytype === 'W' ? 'WARRANTY' :
                    STRgraphdetails.Object.ast_paytype === 'I' ? 'INTERNAL' :
                    STRgraphdetails.Object.ast_paytype === 'R' ? 'RETAIL' :
                    (STRgraphdetails.Object.ast_paytype | slice:0:30) +
                    (STRgraphdetails.Object.ast_paytype.length > 30 ? '...' : '')
                    ) : '--')
                    }}
                </span>

                <span class="mx-2">-</span> -->

                <span style="color: #2d91f1; font-weight: 500;">
                    {{
                    !STRgraphdetails.Object.variable
                    ? '-'
                    : (STRgraphdetails.Object.variable === 'GP'
                    ? 'GP%'
                    : STRgraphdetails.Object.variable)
                    }}
                </span>

            </h6>

            <div class="chart-wrapper">
                <canvas #mychart id="myChart" style="display: block;
                 width: 1050px;
                 height: 381px;
                 padding: 0.5rem 3rem;">
                </canvas>
            </div>

        </div>

    </div>

</div>
